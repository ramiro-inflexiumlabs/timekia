<script type="text/babel">
// Kiosk with looping animation: idle → scanning → success → reset
function KioskAnimated({ theme='dark', loop=true }) {
  const [time, setTime] = React.useState(new Date());
  const [phase, setPhase] = React.useState('idle');
  const [employee] = React.useState({name:'Carlos López', role:'Operario · Planta 2'});

  React.useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  React.useEffect(() => {
    if (!loop) return;
    let timers = [];
    const cycle = () => {
      setPhase('idle');
      timers.push(setTimeout(() => setPhase('scanning'), 1800));
      timers.push(setTimeout(() => setPhase('success'), 4200));
      timers.push(setTimeout(() => cycle(), 7200));
    };
    cycle();
    return () => timers.forEach(clearTimeout);
  }, [loop]);

  const clock = time.toLocaleTimeString('es-UY', {hour:'2-digit', minute:'2-digit', hour12:false});
  const date = time.toLocaleDateString('es-UY', {weekday:'long', day:'2-digit', month:'long'});
  const isDark = theme === 'dark';

  const surface = isDark ? '#0D1117' : '#FFFFFF';
  const headBg = isDark ? 'rgba(43,111,212,.15)' : 'rgba(43,111,212,.08)';
  const headBorder = isDark ? 'rgba(43,111,212,.2)' : 'rgba(43,111,212,.18)';
  const fg = isDark ? '#E8EAF0' : '#0F1117';
  const fgMuted = isDark ? '#8892A4' : '#6B7280';
  const ringBase = 'rgba(43,111,212,.05)';

  return (
    <div style={{
      width:'100%', height:'100%', background: surface,
      display:'flex', flexDirection:'column',
      color: fg, fontFamily:"'Inter',sans-serif",
      position:'relative', overflow:'hidden'
    }}>
      {/* Header */}
      <div style={{
        height:'15%', background: headBg,
        borderBottom:`1px solid ${headBorder}`,
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'0 6%'
      }}>
        <div style={{fontWeight:900, color:'#2B6FD4', letterSpacing:'-0.03em', fontSize:'1.5em'}}>
          time<span style={{color:'#F5831F'}}>kia</span>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'1.9em', fontWeight:700, fontVariantNumeric:'tabular-nums', lineHeight:1}}>{clock}</div>
          <div style={{color:fgMuted, fontSize:'.82em', marginTop:4, textTransform:'capitalize'}}>{date}</div>
        </div>
      </div>

      {/* Stage */}
      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'6%', padding:'4%', position:'relative'}}>
        {phase === 'success' ? (
          <div key="success" style={{animation:'tk-pop .35s cubic-bezier(.2,.9,.3,1.3)'}}>
            <div style={{
              width:96, height:96, borderRadius:'50%',
              border:'3px solid #22C55E',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:'2.6em', background:'rgba(34,197,94,.12)',
              margin:'0 auto 18px',
              boxShadow:'0 0 0 8px rgba(34,197,94,.08)'
            }}>✓</div>
            <div style={{textAlign:'center'}}>
              <div style={{color:'#22C55E', fontWeight:700, fontSize:'.9em', textTransform:'uppercase', letterSpacing:'.12em'}}>Entrada registrada</div>
              <div style={{color:fg, fontWeight:800, fontSize:'1.4em', margin:'6px 0 2px'}}>{employee.name}</div>
              <div style={{color:fgMuted, fontSize:'.85em'}}>{employee.role} · {clock}</div>
            </div>
          </div>
        ) : (
          <>
            <div style={{position:'relative', width:100, height:100}}>
              <div style={{
                position:'absolute', inset:0, borderRadius:'50%',
                border:'3px solid rgba(43,111,212,.6)',
                display:'flex', alignItems:'center', justifyContent:'center',
                background: ringBase,
                overflow:'hidden'
              }}>
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke={isDark?'rgba(43,111,212,.65)':'rgba(43,111,212,.55)'} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="9" r="3.5"/>
                  <path d="M5 20c1.2-3.2 4-4.5 7-4.5s5.8 1.3 7 4.5"/>
                </svg>
                {phase === 'scanning' && (
                  <div style={{
                    position:'absolute', left:0, right:0, top:0, height:'100%',
                    background:'linear-gradient(180deg, transparent 0%, rgba(43,111,212,.4) 48%, rgba(43,111,212,.6) 50%, rgba(43,111,212,.4) 52%, transparent 100%)',
                    animation:'tk-scan 1.6s linear infinite'
                  }}/>
                )}
              </div>
              {phase === 'scanning' && (
                <>
                  {['tl','tr','bl','br'].map(pos => {
                    const base = {position:'absolute', width:14, height:14, borderColor:'#F5831F', borderStyle:'solid'};
                    const pos2 = {
                      tl:{top:-8,left:-8,borderWidth:'2px 0 0 2px'},
                      tr:{top:-8,right:-8,borderWidth:'2px 2px 0 0'},
                      bl:{bottom:-8,left:-8,borderWidth:'0 0 2px 2px'},
                      br:{bottom:-8,right:-8,borderWidth:'0 2px 2px 0'}
                    }[pos];
                    return <div key={pos} style={{...base,...pos2}}/>
                  })}
                </>
              )}
            </div>
            <div style={{color:fgMuted, textAlign:'center', lineHeight:1.4, fontSize:'1em', maxWidth:240}}>
              {phase === 'scanning'
                ? <><span style={{color:'#F5831F', fontWeight:700}}>Identificando…</span><br/>mantené la mirada</>
                : <>Mirá la cámara<br/>para identificarte</>
              }
            </div>
          </>
        )}
      </div>

      {/* Action buttons */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3%', padding:'0 6%', marginBottom:'6%'}}>
        {[
          ['Entrada','linear-gradient(135deg,#16A34A,#22C55E)', '#22C55E'],
          ['Salida','linear-gradient(135deg,#B91C1C,#EF4444)', '#EF4444'],
          ['Descanso','linear-gradient(135deg,#1D4ED8,#3B82F6)', '#3B82F6'],
          ['Retorno','linear-gradient(135deg,#7C3AED,#A855F7)', '#A855F7']
        ].map(([l,bg,solid],i) => {
          const isActive = phase==='success' && l==='Entrada';
          const dimmed = phase==='success' && l!=='Entrada';
          return (
            <div key={i} style={{
              height:32, borderRadius:6, background:bg,
              display:'flex', alignItems:'center', justifyContent:'center',
              color:'#fff', fontWeight:700, fontSize:'.88em',
              opacity: dimmed ? .3 : 1,
              transform: isActive ? 'scale(1.03)' : 'scale(1)',
              boxShadow: isActive ? `0 0 0 2px ${solid}, 0 8px 20px ${solid}55` : 'none',
              transition:'all .3s ease'
            }}>{l}{isActive ? ' ✓' : ''}</div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{
        height:'9%',
        borderTop: isDark ? '1px solid rgba(255,255,255,.06)' : '1px solid rgba(0,0,0,.06)',
        display:'flex', alignItems:'center', justifyContent:'center',
        color:fgMuted, fontSize:'.72em', letterSpacing:'.1em', textTransform:'uppercase'
      }}>timekia wall · inflexium labs</div>
    </div>
  );
}

window.KioskAnimated = KioskAnimated;
</script>

                        headers:{'Content-Type':'application/json'},
                        body: JSON.stringify(data)
                      });
                      if (!r.ok) throw new Error('Error');
                      setSubmitted(true);

                      setSendError('Hubo un error. Escribinos a ventas@inflexiumlabs.com');

                      setSending(false);

            Usá *texto* para destacar en naranja. Saltos de línea con enter.
          </div>
          <div style={{fontSize:11, fontWeight:700, color:isDark?'#8892A4':'#6B7280', marginTop:12, marginBottom:6}}>Presets:</div>
          <div style={{display:'flex', flexDirection:'column', gap:4}}>
            {headlinePresets.map((h,i) => (
              <button key={i} onClick={()=>setHeadline(h)} style={{
                textAlign:'left', padding:'6px 10px',
                background: 'transparent',
                border:`1px solid ${isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)'}`,
                borderRadius:6, cursor:'pointer',
                color: isDark?'#8892A4':'#5A6170',
                fontSize:11, lineHeight:1.3,
                fontFamily:'inherit'
              }}>{h.replace(/\*/g,'').replace(/\n/g,' · ')}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

window.TweaksPanel = TweaksPanel;
</script>

<!-- ═══════════════════════════════════════════════
     App Entry Point
════════════════════════════════════════════════ -->
<script type="text/babel">
const TWEAK_DEFAULTS = {
  "variant": "split",
  "headline": "Fichaje facial *inteligente*\npara tu organización",
  "theme": "light"
};

function App() {
  const [variant, setVariant] = React.useState(TWEAK_DEFAULTS.variant);
  const [headline, setHeadline] = React.useState(TWEAK_DEFAULTS.headline);
  const [isDark, setIsDark] = React.useState(TWEAK_DEFAULTS.theme !== 'light');
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => {
    document.body.style.background = isDark ? '#0F1117' : '#FAFAFB';
    document.body.style.color = isDark ? '#E8EAF0' : '#0F1117';
  }, [isDark]);

  const HeroComponent = {
    split: HeroSplit,
    center: HeroCenter,
    editorial: HeroEditorial
  }[variant] || HeroSplit;

  return (
    <div>
      <TKNav isDark={isDark} onToggleTheme={()=>setIsDark(d=>!d)}/>
      <HeroComponent isDark={isDark} headline={headline}/>
      <PainPoints isDark={isDark}/>
      <Environments isDark={isDark}/>
      <HowItWorks isDark={isDark}/>
      <AgendarForm isDark={isDark}/>
      <Footer isDark={isDark}/>

      {/* Tweaks toggle button */}
      <button
        onClick={()=>setTweaksVisible(v=>!v)}
        title="Tweaks"
        style={{
          position:'fixed', bottom:20, left:20, zIndex:200,
          width:44, height:44, borderRadius:'50%',
          background: isDark?'rgba(22,27,38,.95)':'rgba(255,255,255,.98)',
          border:`1px solid ${isDark?'rgba(255,255,255,.12)':'rgba(0,0,0,.12)'}`,
          boxShadow:'0 8px 24px rgba(0,0,0,.25)',
          cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
          color: tweaksVisible ? '#F5831F' : (isDark?'#8892A4':'#6B7280'),
          fontSize:18, backdropFilter:'blur(12px)'
        }}
      >⚙</button>

      <TweaksPanel
        visible={tweaksVisible}
        variant={variant} setVariant={setVariant}
        headline={headline} setHeadline={setHeadline}
        isDark={isDark} setIsDark={setIsDark}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
